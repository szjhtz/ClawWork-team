name: CI Bot
on:
  issue_comment:
    types:
      - created

  pull_request_review_comment:
    types:
      - created

  issues:
    types:
      - opened

  pull_request_target:
    types:
      - opened
      - synchronize

env:
  PLUGINS: |-
    assign
    auto-cc
    cc

  AUTHOR_PLUGINS: |-
    label-bug
    label-documentation
    label-enhancement
    label-question
    retest

  MEMBERS_PLUGINS: |-
    label-duplicate
    label-good-first-issue
    label-help-wanted
    label-invalid
    label-kind
    label-wontfix
    lifecycle
    retest

  REVIEWERS_PLUGINS: |-
    label-lgtm
    retitle

  APPROVERS_PLUGINS: |-
    label-approve
    label
    merge
    base
    rebase
    cherry-pick

  MAINTAINERS_PLUGINS: ''

  REVIEWERS: |-
    samzong
    yankay

  APPROVERS: |-
    samzong
    yankay

  MAINTAINERS: ''

  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPOSITORY: ${{ github.repository }}
  DETAILS: |-

    <details>
    <summary>Details</summary>

    Instructions for interacting with me using comments are available here.
    If you have questions or suggestions related to my behavior, please file an issue against the [gh-ci-bot](https://github.com/wzshiming/gh-ci-bot) repository.

    </details>

permissions:
  actions: write
  checks: read
  contents: write
  deployments: none
  id-token: none
  issues: write
  discussions: read
  packages: none
  pages: none
  pull-requests: write
  repository-projects: read
  security-events: none
  statuses: read

jobs:
  bot:
    name: Bot
    runs-on: ubuntu-latest
    steps:
      - name: Issue Opened
        uses: wzshiming/gh-ci-bot@v1.5.0
        if: ${{ github.event_name == 'issues' }}
        env:
          LOGIN: ${{ github.event.issue.user.login }}
          AUTHOR: ${{ github.event.issue.user.login }}
          MESSAGE: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR_ASSOCIATION: ${{ github.event.issue.author_association }}
          ISSUE_KIND: issue
          TYPE: created
          GREETING: |-
            Hi @${{ github.event.issue.user.login }},
            Thanks for opening an issue!
            We will look into it as soon as possible.

      - name: PR Opened
        uses: wzshiming/gh-ci-bot@v1.5.0
        if: ${{ github.event_name == 'pull_request_target' && github.event.action == 'opened' }}
        env:
          LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          MESSAGE: ${{ github.event.pull_request.body }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          ISSUE_KIND: pr
          TYPE: created
          GREETING: |-
            Hi @${{ github.event.pull_request.user.login }},
            Thanks for your pull request!
            If the PR is ready, use the `/auto-cc` command to assign Reviewer to Review.
            We will review it shortly.

      - name: PR Synchronize
        uses: wzshiming/gh-ci-bot@v1.5.0
        if: ${{ github.event_name == 'pull_request_target' && github.event.action == 'synchronize' }}
        env:
          LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          MESSAGE: ''
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          ISSUE_KIND: pr
          TYPE: synchronize

      - name: Issue Commented
        uses: wzshiming/gh-ci-bot@v1.5.0
        if: ${{ github.event_name == 'issue_comment' && !github.event.issue.pull_request }}
        env:
          LOGIN: ${{ github.event.comment.user.login }}
          AUTHOR: ${{ github.event.issue.user.login }}
          MESSAGE: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_KIND: issue
          TYPE: comment

      - name: PR Review Commented
        uses: wzshiming/gh-ci-bot@v1.5.0
        if: ${{ github.event_name == 'pull_request_review_comment' }}
        env:
          LOGIN: ${{ github.event.comment.user.login }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          MESSAGE: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_KIND: pr
          TYPE: comment

      - name: PR Commented
        uses: wzshiming/gh-ci-bot@v1.5.0
        if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request }}
        env:
          LOGIN: ${{ github.event.comment.user.login }}
          AUTHOR: ${{ github.event.issue.user.login }}
          MESSAGE: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          ISSUE_KIND: pr
          TYPE: comment
