name: Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'keynote/**'
      - '.github/workflows/website.yml'
  pull_request:
    paths:
      - 'website/**'
      - 'keynote/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @clawwork/website exec tsc --noEmit

      - name: Build website
        run: pnpm --filter @clawwork/website build
        env:
          VITE_BASE: /ClawWork/

      - name: Build keynote
        run: pnpm --filter @clawwork/keynote build --base /ClawWork/keynote/

      - name: Patch keynote SPA redirect
        run: node -e "const f='keynote/dist/index.html';const fs=require('fs');const h=fs.readFileSync(f,'utf8');fs.writeFileSync(f,h.replace('<head>','<head><script>(function(){var q=location.search.slice(1);if(q&&!q.includes(\"=\")){history.replaceState(null,\"\",location.pathname+q+location.hash)}})()</script>'))"

      - name: Merge outputs
        run: cp -r keynote/dist website/dist/keynote

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
